<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulation - جدول ذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0A1A2F;
--stroke:#1e2a4a;
--txt:#eaf0ff;
--muted:#a7b7ff;
--accent:#6AE4FF;
--accent2:#8B5CFF;
--shadow:0 18px 60px rgba(0,0,0,.45);
--r:22px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:"Cairo",sans-serif;color:var(--txt);background:var(--bg);overflow-x:hidden}

/* الخلفية */
.bg{position:fixed;inset:0;z-index:-1;overflow:hidden}
.grid{position:absolute;inset:-30%;
background:
linear-gradient(to right, rgba(106,228,255,.08) 1px, transparent 1px),
linear-gradient(to bottom, rgba(106,228,255,.08) 1px, transparent 1px);
background-size:70px 70px;
transform:rotate(12deg);
animation:gridMove 15s linear infinite;
opacity:.6;}
.orbs{position:absolute;inset:0}
.orb{position:absolute;width:280px;height:280px;border-radius:50%;
background:radial-gradient(circle at 30% 30%, rgba(106,228,255,.3), transparent 60%);
filter:blur(12px);animation:float 12s ease-in-out infinite;opacity:.8;}
.orb:nth-child(2){left:65%;top:5%;animation-duration:16s}
.orb:nth-child(3){left:15%;top:70%;animation-duration:14s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
@keyframes gridMove{0%{transform:translate3d(0,0,0) rotate(12deg)}100%{transform:translate3d(-140px,100px,0) rotate(12deg)}}

/* الهيدر */
header{
width:min(1100px,92%);
margin:30px auto;
padding:18px;
border:1px solid rgba(30,42,74,.7);
border-radius:var(--r);
background:rgba(14,19,38,.55);
backdrop-filter:blur(10px);
box-shadow:var(--shadow);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}
nav{display:flex;gap:10px;flex-wrap:wrap}
.navBtn{border:1px solid rgba(30,42,74,.9);background:rgba(7,10,18,.35);color:var(--txt);padding:10px 14px;border-radius:14px;font-weight:700;font-size:13px;transition:.25s;text-decoration:none;}
.navBtn:hover{transform:translateY(-2px);border-color:var(--accent)}

/* البطاقة */
main{width:min(1100px,92%);margin:40px auto}
.card{border-radius:var(--r);border:1px solid rgba(30,42,74,.7);background:rgba(14,19,38,.55);backdrop-filter:blur(10px);box-shadow:var(--shadow);padding:25px;margin-bottom:20px;}
#simulation-form input,#simulation-form textarea{padding:8px;border-radius:12px;border:none;margin-right:10px;width:100%;background: rgba(7,10,18,.35);color:var(--txt);}
#simulation-form button{padding:8px 14px;border-radius:12px;border:none;background:var(--accent);color:#071025;font-weight:700;cursor:pointer;margin-top:10px;}
#table-result{margin-top:20px;border-collapse: collapse;width:100%;}
#table-result th, #table-result td{border:1px solid var(--stroke);padding:8px;text-align:center;}
#table-result th{background:rgba(7,10,18,.35);}
.peak{background:#8B5CFF33;color:#fff;font-weight:700;} /* الخلايا الصعبة */

/* شات */
#chat{position:fixed;bottom:20px;right:20px;width:300px;max-height:400px;background:rgba(14,19,38,.9);border-radius:22px;border:1px solid var(--stroke);display:flex;flex-direction:column;box-shadow:var(--shadow);font-size:14px;}
.chat-header{padding:10px;font-weight:700;border-bottom:1px solid var(--stroke)}
.chat-body{flex:1;overflow-y:auto;padding:10px}
#chat-input{border:none;outline:none;padding:8px;border-top:1px solid var(--stroke);background:#0b1225;color:#fff}
.user-msg{color:#fff;margin-bottom:6px}
.bot-msg{color:var(--accent);margin-bottom:6px}
</style>
</head>
<body>
<div class="bg">
<div class="grid"></div>
<div class="orbs">
<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>
</div>
</div>

<header>
<h3>🗓 Simulation</h3>
<nav>
<a href="index.html" class="navBtn">الرئيسية</a>
<a href="course-roadmap.html" class="navBtn">Course Roadmap</a>
<a href="academic-alerts.html" class="navBtn">Academic Alerts</a>
<a href="simulation.html" class="navBtn">Simulation</a>
<a href="profile.html" class="navBtn">Academic Profile</a>
</nav>
</header>

<main>
<div class="card">
<h2>محاكاة جدول الامتحانات الذكي</h2>
<p>اكتب أسماء المواد وعدد أيام الامتحانات، وسيتم توزيع المذاكرة تلقائيًا مع تمييز الأيام الصعبة.</p>

<form id="simulation-form">
<label>أسماء المواد (افصل بينهم بفاصلة):</label><br>
<textarea id="subjects" rows="2" placeholder="مثال: رياضيات, فيزياء, لغة عربية"></textarea>
<label>عدد الأيام: <input type="number" id="days" min="1" value="5"></label><br>
<button type="submit">توليد الجدول</button>
</form>

<table id="table-result"></table>
</div>
</main>

<div id="chat">
<div class="chat-header">🗨 شات ذكي</div>
<div class="chat-body" id="chat-body"></div>
<input type="text" id="chat-input" placeholder="اكتب رسالتك واضغط Enter">
</div>

<script>
const chatBody=document.getElementById("chat-body");
const chatInput=document.getElementById("chat-input");

chatInput.addEventListener("keypress",function(e){
if(e.key==="Enter" && chatInput.value.trim()!==""){
let msg=chatInput.value.trim();
chatBody.innerHTML+=`<div class="user-msg">أنت: ${msg}</div>`;
let reply="شات ذكي: فهمت رسالتك";
chatBody.innerHTML+=`<div class="bot-msg">${reply}</div>`;
chatBody.scrollTop=chatBody.scrollHeight;
chatInput.value="";
}
});

// توليد الجدول الذكي
document.getElementById("simulation-form").addEventListener("submit",function(e){
e.preventDefault();
let subjectsInput=document.getElementById("subjects").value;
let subjects=subjectsInput.split(",").map(s=>s.trim()).filter(s=>s!=="");
let days=parseInt(document.getElementById("days").value);
let table=document.getElementById("table-result");
table.innerHTML="";

// رؤوس الجدول
let header="<tr><th>اليوم</th>";
subjects.forEach(s=>header+=`<th>${s}</th>`);
header+="</tr>";
table.innerHTML+=header;

// توزيع المواد
for(let d=1;d<=days;d++){
let row=`<tr><td>يوم ${d}</td>`;
subjects.forEach(s=>{
let hours=Math.floor(Math.random()*3)+1; // 1-3 ساعات
let cellClass=(hours>=3)?"peak":"";
row+=`<td class="${cellClass}">${hours} س</td>`;
});
row+="</tr>";
table.innerHTML+=row;
}
});
</script>
</body>
</html>
